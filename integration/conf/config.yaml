deployment:
  role: data_plane
  role_data_plane:
    config_provider: yaml

apisix:
  node_listen:
    - port: 80
  ssl:
    enable: true
    listen:
      - port: 443
  extra_lua_path: "/usr/local/apisix/custom-plugins/?.lua"

# Root-level plugins list (replaces defaults — must include all needed plugins)
plugins:
  - tls-clienthello-limiter       # custom plugin
  - proxy-rewrite
  - prometheus
  - real-ip
  - limit-conn
  - limit-count
  - limit-req
  - redirect
  - response-rewrite
  - grpc-transcode
  - grpc-web
  - public-api
  - serverless-pre-function
  - serverless-post-function
  - ext-plugin-pre-req
  - ext-plugin-post-req
  - ext-plugin-post-resp
  - ip-restriction
  - ua-restriction
  - key-auth
  - basic-auth
  - jwt-auth
  - consumer-restriction

nginx_config:
  http:
    custom_lua_shared_dict:
      tls-hello-per-ip: 1m
      tls-hello-per-domain: 1m
      tls-ip-blocklist: 1m

  http_end_configuration_snippet: |
    server {
        listen 0.0.0.0:9092;
        server_name _;

        location = /healthz {
            access_log off;
            return 200 'ok';
        }
    }

plugin_attr:
  tls-clienthello-limiter:
    per_ip_rate: 2
    per_ip_burst: 4
    per_domain_rate: 5
    per_domain_burst: 10
    block_ttl: 10
  prometheus:
    enable_export_server: true
    export_addr:
      ip: "0.0.0.0"
      port: 9091
    refresh_interval: 1
